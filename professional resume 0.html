<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .form-section {
            padding: 30px;
            background: #f8f9fa;
            overflow-y: auto;
            max-height: 90vh;
        }

        .preview-section {
            padding: 30px;
            background: white;
            overflow-y: auto;
            max-height: 90vh;
        }

        .template-selector {
            margin-bottom: 30px;
        }

        .template-selector h3 {
            margin-bottom: 15px;
            color: #2c3e50;
            font-size: 1.3em;
        }

        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .template-option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            background: white;
        }

        .template-option:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .template-option.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .section-header h3 {
            color: #2c3e50;
            font-size: 1.4em;
        }

        .add-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .add-btn:hover {
            background: #5a67d8;
        }

        .dynamic-section {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            background: white;
            position: relative;
        }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }

        .remove-btn:hover {
            background: #c0392b;
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        /* CV Preview Styles */
        .cv-preview {
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            transform-origin: top left;
        }

        /* Modern Template */
        .template-modern {
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.6;
        }

        .template-modern .cv-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .template-modern .cv-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .template-modern .cv-header .subtitle {
            font-size: 1.3em;
            opacity: 0.9;
        }

        .template-modern .cv-content {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
        }

        .template-modern .cv-section {
            margin-bottom: 30px;
        }

        .template-modern .cv-section h2 {
            color: #2c3e50;
            font-size: 1.4em;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .template-modern .cv-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .template-modern .cv-item:last-child {
            border-bottom: none;
        }

        .template-modern .cv-item h3 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .template-modern .cv-item .meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        /* Classic Template */
        .template-classic {
            font-family: 'Times New Roman', serif;
            line-height: 1.8;
        }

        .template-classic .cv-header {
            text-align: center;
            padding: 40px;
            border-bottom: 3px solid #2c3e50;
        }

        .template-classic .cv-header h1 {
            font-size: 2.2em;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .template-classic .cv-content {
            padding: 30px;
        }

        .template-classic .cv-section {
            margin-bottom: 25px;
        }

        .template-classic .cv-section h2 {
            color: #2c3e50;
            font-size: 1.3em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Creative Template */
        .template-creative {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .template-creative .cv-header {
            padding: 50px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .template-creative .cv-header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .template-creative .cv-content {
            padding: 40px;
            background: rgba(255,255,255,0.95);
            color: #333;
        }

        .template-creative .cv-section h2 {
            color: #f5576c;
            font-size: 1.5em;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .skill-item {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .progress-indicator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #ddd;
            z-index: 1000;
        }

        .progress-bar {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s ease;
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .form-section,
            .preview-section {
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .template-modern .cv-content {
                grid-template-columns: 1fr;
            }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #28a745;
            color: white;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transform: translateX(300px);
            transition: all 0.3s ease;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        .auto-save {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="progress-indicator">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Professional CV Builder</h1>
            <p>Create stunning resumes that get you noticed</p>
        </div>

        <div class="main-content">
            <!-- Form Section -->
            <div class="form-section">
                <div class="auto-save" id="autoSaveIndicator">Auto-saving...</div>
                
                <!-- Template Selection -->
                <div class="template-selector">
                    <h3>Choose Template</h3>
                    <div class="template-grid">
                        <div class="template-option active" data-template="modern">
                            <strong>Modern</strong>
                            <p>Clean & Professional</p>
                        </div>
                        <div class="template-option" data-template="classic">
                            <strong>Classic</strong>
                            <p>Traditional & Elegant</p>
                        </div>
                        <div class="template-option" data-template="creative">
                            <strong>Creative</strong>
                            <p>Bold & Unique</p>
                        </div>
                    </div>
                </div>

                <!-- Personal Information -->
                <div class="section-header">
                    <h3>Personal Information</h3>
                </div>
                
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label>Professional Title *</label>
                    <input type="text" id="title" placeholder="Senior Software Engineer" required>
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="john.doe@email.com" required>
                </div>
                
                <div class="form-group">
                    <label>Phone *</label>
                    <input type="tel" id="phone" placeholder="+1 (555) 123-4567" required>
                </div>
                
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="location" placeholder="Seattle, WA">
                </div>
                
                <div class="form-group">
                    <label>LinkedIn</label>
                    <input type="url" id="linkedin" placeholder="https://linkedin.com/in/johndoe">
                </div>
                
                <div class="form-group">
                    <label>GitHub</label>
                    <input type="url" id="github" placeholder="https://github.com/johndoe">
                </div>

                <!-- Professional Summary -->
                <div class="section-header">
                    <h3>Professional Summary</h3>
                </div>
                
                <div class="form-group">
                    <label>Summary</label>
                    <textarea id="summary" placeholder="Brief professional summary highlighting your key achievements and expertise..." rows="4"></textarea>
                </div>

                <!-- Experience -->
                <div class="section-header">
                    <h3>Work Experience</h3>
                    <button class="add-btn" onclick="addExperience()">+ Add Experience</button>
                </div>
                <div id="experienceContainer"></div>

                <!-- Education -->
                <div class="section-header">
                    <h3>Education</h3>
                    <button class="add-btn" onclick="addEducation()">+ Add Education</button>
                </div>
                <div id="educationContainer"></div>

                <!-- Skills -->
                <div class="section-header">
                    <h3>Skills</h3>
                    <button class="add-btn" onclick="addSkill()">+ Add Skill</button>
                </div>
                <div id="skillsContainer"></div>

                <!-- Projects -->
                <div class="section-header">
                    <h3>Projects</h3>
                    <button class="add-btn" onclick="addProject()">+ Add Project</button>
                </div>
                <div id="projectsContainer"></div>

                <!-- Certifications -->
                <div class="section-header">
                    <h3>Certifications</h3>
                    <button class="add-btn" onclick="addCertification()">+ Add Certification</button>
                </div>
                <div id="certificationsContainer"></div>

                <!-- Actions -->
                <div class="actions">
                    <button class="btn btn-primary" onclick="downloadPDF()">📄 Download PDF</button>
                    <button class="btn btn-secondary" onclick="saveData()">💾 Save Data</button>
                    <button class="btn btn-secondary" onclick="loadData()">📂 Load Data</button>
                    <button class="btn btn-success" onclick="previewFullscreen()">🔍 Preview</button>
                </div>
            </div>

            <!-- Preview Section -->
            <div class="preview-section">
                <div id="cvPreview" class="cv-preview template-modern">
                    <!-- CV content will be generated here -->
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        // Global variables
        let currentTemplate = 'modern';
        let experienceCount = 0;
        let educationCount = 0;
        let skillsCount = 0;
        let projectsCount = 0;
        let certificationsCount = 0;
        let autoSaveTimer;

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            loadSavedData();
            setupEventListeners();
            updatePreview();
            updateProgress();
        });

        // Setup event listeners
        function setupEventListeners() {
            // Template selection
            document.querySelectorAll('.template-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.template-option').forEach(opt => opt.classList.remove('active'));
                    this.classList.add('active');
                    currentTemplate = this.dataset.template;
                    updatePreview();
                });
            });

            // Form inputs
            document.querySelectorAll('input, textarea, select').forEach(input => {
                input.addEventListener('input', function() {
                    updatePreview();
                    scheduleAutoSave();
                    updateProgress();
                });
            });
        }

        // Auto-save functionality
        function scheduleAutoSave() {
            clearTimeout(autoSaveTimer);
            document.getElementById('autoSaveIndicator').style.opacity = '1';
            autoSaveTimer = setTimeout(() => {
                saveData(true);
                document.getElementById('autoSaveIndicator').style.opacity = '0.5';
            }, 1000);
        }

        // Progress indicator
        function updateProgress() {
            const requiredFields = ['fullName', 'title', 'email', 'phone'];
            let filledFields = 0;
            
            requiredFields.forEach(field => {
                if (document.getElementById(field).value.trim()) {
                    filledFields++;
                }
            });
            
            // Add experience and education to progress
            if (experienceCount > 0) filledFields++;
            if (educationCount > 0) filledFields++;
            
            const progress = (filledFields / (requiredFields.length + 2)) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // Add experience section
        function addExperience() {
            experienceCount++;
            const container = document.getElementById('experienceContainer');
            const div = document.createElement('div');
            div.className = 'dynamic-section';
            div.innerHTML = `
                <button class="remove-btn" onclick="removeSection(this)">×</button>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" class="experience-title" placeholder="Software Engineer">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" class="experience-company" placeholder="Microsoft">
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="month" class="experience-start">
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="month" class="experience-end">
                </div>
                <div class="form-group">
                    <label>Currently Working</label>
                    <input type="checkbox" class="experience-current" onchange="toggleEndDate(this)">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="experience-description" rows="3" placeholder="Describe your responsibilities and achievements..."></textarea>
                </div>
            `;
            container.appendChild(div);
            
            // Add event listeners to new inputs
            div.querySelectorAll('input, textarea').forEach(input => {
                input.addEventListener('input', function() {
                    updatePreview();
                    scheduleAutoSave();
                });
            });
            
            updatePreview();
            updateProgress();
        }

        // Add education section
        function addEducation() {
            educationCount++;
            const container = document.getElementById('educationContainer');
            const div = document.createElement('div');
            div.className = 'dynamic-section';
            div.innerHTML = `
                <button class="remove-btn" onclick="removeSection(this)">×</button>
                <div class="form-group">
                    <label>Degree</label>
                    <input type="text" class="education-degree" placeholder="Bachelor of Science in Computer Science">
                </div>
                <div class="form-group">
                    <label>Institution</label>
                    <input type="text" class="education-institution" placeholder="University of Washington">
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <input type="number" class="education-year" placeholder="2020" min="1900" max="2030">
                </div>
                <div class="form-group">
                    <label>GPA (Optional)</label>
                    <input type="text" class="education-gpa" placeholder="3.8/4.0">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="education-description" rows="2" placeholder="Relevant coursework, honors, activities..."></textarea>
                </div>
            `;
            container.appendChild(div);
            
            // Add event listeners to new inputs
            div.querySelectorAll('input, textarea').forEach(input => {
                input.addEventListener('input', function() {
                    updatePreview();
                    scheduleAutoSave();
                });
            });
            
            updatePreview();
            updateProgress();
        }

        // Add skill section
        function addSkill() {
            skillsCount++;
            const container = document.getElementById('skillsContainer');
            const div = document.createElement('div');
            div.className = 'dynamic-section';
            div.innerHTML = `
                <button class="remove-btn" onclick="removeSection(this)">×</button>
                <div class="form-group">
                    <label>Skill Category</label>
                    <input type="text" class="skill-category" placeholder="Programming Languages">
                </div>
                <div class="form-group">
                    <label>Skills (comma-separated)</label>
                    <input type="text" class="skill-items" placeholder="JavaScript, Python, C#, Java">
                </div>
            `;
            container.appendChild(div);
            
            // Add event listeners to new inputs
            div.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', function() {
                    updatePreview();
                    scheduleAutoSave();
                });
            });
            
            updatePreview();
        }

        // Add project section
        function addProject() {
            projectsCount++;
            const container = document.getElementById('projectsContainer');
            const div = document.createElement('div');
            div.className = 'dynamic-section';
            div.innerHTML = `
                <button class="remove-btn" onclick="removeSection(this)">×</button>
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" class="project-name" placeholder="E-commerce Platform">
                </div>
                <div class="form-group">
                    <label>Technologies Used</label>
                    <input type="text" class="project-tech" placeholder="React, Node.js, MongoDB">
                </div>
                <div class="form-group">
                    <label>Project URL (Optional)</label>
                    <input type="url" class="project-url" placeholder="https://github.com/user/project">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea class="project-description" rows="3" placeholder="Describe the project and your role..."></textarea>
                </div>
            `;
            container.appendChild(div);
            
            // Add event listeners to new inputs
            div.querySelectorAll('input, textarea').forEach(input => {
                input.addEventListener('input', function() {
                    updatePreview();
                    scheduleAutoSave();
                });
            });
            
            updatePreview();
        }

        // Add certification section
        function addCertification() {
            certificationsCount++;
            const container = document.getElementById('certificationsContainer');
            const div = document.createElement('div');
            div.className = 'dynamic-section';
            div.innerHTML = `
                <button class="remove-btn" onclick="removeSection(this)">×</button>
                <div class="form-group">
                    <label>Certification Name</label>
                    <input type="text" class="cert-name" placeholder="Microsoft Azure Fundamentals">
                </div>
                <div class="form-group">
                    <label>Issuing Organization</label>
                    <input type="text" class="cert-org" placeholder="Microsoft">
                </div>
                <div class="form-group">
                    <label>Issue Date</label>
                    <input type="month" class="cert-date">
                </div>
                <div class="form-group">
                    <label>Credential ID (Optional)</label>
                    <input type="text" class="cert-id" placeholder="ABC123XYZ">
                </div>
            `;
            container.appendChild(div);
            
            // Add event listeners to new inputs
            div.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', function() {
                    updatePreview();
                    scheduleAutoSave();
                });
            });
            
            updatePreview();
        }

        // Remove section
        function removeSection(button) {
            const section = button.parentElement;
            const container = section.parentElement;
            
            // Update counters
            if (container.id === 'experienceContainer') experienceCount--;
            if (container.id === 'educationContainer') educationCount--;
            if (container.id === 'skillsContainer') skillsCount--;
            if (container.id === 'projectsContainer') projectsCount--;
            if (container.id === 'certificationsContainer') certificationsCount--;
            
            section.remove();
            updatePreview();
            updateProgress();
            scheduleAutoSave();
        }

        // Toggle end date for current job
        function toggleEndDate(checkbox) {
            const endDateInput = checkbox.closest('.dynamic-section').querySelector('.experience-end');
            endDateInput.disabled = checkbox.checked;
            if (checkbox.checked) {
                endDateInput.value = '';
            }
            updatePreview();
        }

        // Update preview
        function updatePreview() {
            const preview = document.getElementById('cvPreview');
            preview.className = `cv-preview template-${currentTemplate}`;
            
            const personalInfo = getPersonalInfo();
            const summary = getSummary();
            const experience = getExperience();
            const education = getEducation();
            const skills = getSkills();
            const projects = getProjects();
            const certifications = getCertifications();
            
            preview.innerHTML = generateCV(personalInfo, summary, experience, education, skills, projects, certifications);
        }

        // Get personal information
        function getPersonalInfo() {
            return {
                fullName: document.getElementById('fullName').value,
                title: document.getElementById('title').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('location').value,
                linkedin: document.getElementById('linkedin').value,
                github: document.getElementById('github').value
            };
        }

        // Get summary
        function getSummary() {
            return document.getElementById('summary').value;
        }

        // Get experience data
        function getExperience() {
            const experiences = [];
            document.querySelectorAll('#experienceContainer .dynamic-section').forEach(section => {
                const current = section.querySelector('.experience-current').checked;
                const endDate = section.querySelector('.experience-end').value;
                
                experiences.push({
                    title: section.querySelector('.experience-title').value,
                    company: section.querySelector('.experience-company').value,
                    startDate: section.querySelector('.experience-start').value,
                    endDate: current ? 'Present' : endDate,
                    description: section.querySelector('.experience-description').value
                });
            });
            return experiences;
        }

        // Get education data
        function getEducation() {
            const education = [];
            document.querySelectorAll('#educationContainer .dynamic-section').forEach(section => {
                education.push({
                    degree: section.querySelector('.education-degree').value,
                    institution: section.querySelector('.education-institution').value,
                    year: section.querySelector('.education-year').value,
                    gpa: section.querySelector('.education-gpa').value,
                    description: section.querySelector('.education-description').value
                });
            });
            return education;
        }

        // Get skills data
        function getSkills() {
            const skills = [];
            document.querySelectorAll('#skillsContainer .dynamic-section').forEach(section => {
                const category = section.querySelector('.skill-category').value;
                const items = section.querySelector('.skill-items').value;
                if (category && items) {
                    skills.push({
                        category: category,
                        items: items.split(',').map(item => item.trim()).filter(item => item)
                    });
                }
            });
            return skills;
        }

        // Get projects data
        function getProjects() {
            const projects = [];
            document.querySelectorAll('#projectsContainer .dynamic-section').forEach(section => {
                projects.push({
                    name: section.querySelector('.project-name').value,
                    tech: section.querySelector('.project-tech').value,
                    url: section.querySelector('.project-url').value,
                    description: section.querySelector('.project-description').value
                });
            });
            return projects;
        }

        // Get certifications data
        function getCertifications() {
            const certifications = [];
            document.querySelectorAll('#certificationsContainer .dynamic-section').forEach(section => {
                certifications.push({
                    name: section.querySelector('.cert-name').value,
                    organization: section.querySelector('.cert-org').value,
                    date: section.querySelector('.cert-date').value,
                    id: section.querySelector('.cert-id').value
                });
            });
            return certifications;
        }

        // Generate CV HTML
        function generateCV(personalInfo, summary, experience, education, skills, projects, certifications) {
            let html = '';
            
            // Header
            html += `
                <div class="cv-header">
                    <h1>${personalInfo.fullName || 'Your Name'}</h1>
                    <div class="subtitle">${personalInfo.title || 'Your Professional Title'}</div>
                    <div class="contact-info">
                        ${personalInfo.email ? `<div class="contact-item">📧 ${personalInfo.email}</div>` : ''}
                        ${personalInfo.phone ? `<div class="contact-item">📞 ${personalInfo.phone}</div>` : ''}
                        ${personalInfo.location ? `<div class="contact-item">📍 ${personalInfo.location}</div>` : ''}
                        ${personalInfo.linkedin ? `<div class="contact-item">🔗 LinkedIn</div>` : ''}
                        ${personalInfo.github ? `<div class="contact-item">🐙 GitHub</div>` : ''}
                    </div>
                </div>
            `;
            
            // Content based on template
            if (currentTemplate === 'modern') {
                html += `
                    <div class="cv-content">
                        <div class="left-column">
                            ${generateSkillsSection(skills)}
                            ${generateEducationSection(education)}
                            ${generateCertificationsSection(certifications)}
                        </div>
                        <div class="right-column">
                            ${generateSummarySection(summary)}
                            ${generateExperienceSection(experience)}
                            ${generateProjectsSection(projects)}
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div class="cv-content">
                        ${generateSummarySection(summary)}
                        ${generateExperienceSection(experience)}
                        ${generateEducationSection(education)}
                        ${generateSkillsSection(skills)}
                        ${generateProjectsSection(projects)}
                        ${generateCertificationsSection(certifications)}
                    </div>
                `;
            }
            
            return html;
        }

        // Generate sections
        function generateSummarySection(summary) {
            if (!summary) return '';
            return `
                <div class="cv-section">
                    <h2>Professional Summary</h2>
                    <p>${summary}</p>
                </div>
            `;
        }

        function generateExperienceSection(experience) {
            if (!experience.length) return '';
            
            let html = `
                <div class="cv-section">
                    <h2>Work Experience</h2>
            `;
            
            experience.forEach(exp => {
                if (exp.title || exp.company) {
                    html += `
                        <div class="cv-item">
                            <h3>${exp.title || 'Position'}</h3>
                            <div class="meta">${exp.company || 'Company'} ${exp.startDate || exp.endDate ? '• ' : ''}${formatDateRange(exp.startDate, exp.endDate)}</div>
                            ${exp.description ? `<p>${exp.description}</p>` : ''}
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            return html;
        }

        function generateEducationSection(education) {
            if (!education.length) return '';
            
            let html = `
                <div class="cv-section">
                    <h2>Education</h2>
            `;
            
            education.forEach(edu => {
                if (edu.degree || edu.institution) {
                    html += `
                        <div class="cv-item">
                            <h3>${edu.degree || 'Degree'}</h3>
                            <div class="meta">${edu.institution || 'Institution'} ${edu.year ? '• ' + edu.year : ''} ${edu.gpa ? '• GPA: ' + edu.gpa : ''}</div>
                            ${edu.description ? `<p>${edu.description}</p>` : ''}
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            return html;
        }

        function generateSkillsSection(skills) {
            if (!skills.length) return '';
            
            let html = `
                <div class="cv-section">
                    <h2>Skills</h2>
            `;
            
            skills.forEach(skillGroup => {
                if (skillGroup.category && skillGroup.items.length) {
                    html += `
                        <div class="cv-item">
                            <h3>${skillGroup.category}</h3>
                            <div class="skills-grid">
                                ${skillGroup.items.map(item => `<div class="skill-item">${item}</div>`).join('')}
                            </div>
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            return html;
        }

        function generateProjectsSection(projects) {
            if (!projects.length) return '';
            
            let html = `
                <div class="cv-section">
                    <h2>Projects</h2>
            `;
            
            projects.forEach(project => {
                if (project.name) {
                    html += `
                        <div class="cv-item">
                            <h3>${project.name}${project.url ? ` <a href="${project.url}" target="_blank">🔗</a>` : ''}</h3>
                            ${project.tech ? `<div class="meta">Technologies: ${project.tech}</div>` : ''}
                            ${project.description ? `<p>${project.description}</p>` : ''}
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            return html;
        }

        function generateCertificationsSection(certifications) {
            if (!certifications.length) return '';
            
            let html = `
                <div class="cv-section">
                    <h2>Certifications</h2>
            `;
            
            certifications.forEach(cert => {
                if (cert.name) {
                    html += `
                        <div class="cv-item">
                            <h3>${cert.name}</h3>
                            <div class="meta">${cert.organization || 'Organization'} ${cert.date ? '• ' + formatDate(cert.date) : ''} ${cert.id ? '• ID: ' + cert.id : ''}</div>
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            return html;
        }

        // Utility functions
        function formatDateRange(start, end) {
            const startFormatted = formatDate(start);
            const endFormatted = end === 'Present' ? 'Present' : formatDate(end);
            
            if (startFormatted && endFormatted) {
                return `${startFormatted} - ${endFormatted}`;
            } else if (startFormatted) {
                return startFormatted;
            } else if (endFormatted) {
                return endFormatted;
            }
            return '';
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString + '-01');
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
        }

        // Download PDF
        function downloadPDF() {
            const element = document.getElementById('cvPreview');
            const opt = {
                margin: 0.5,
                filename: `${document.getElementById('fullName').value.replace(/\s+/g, '_') || 'CV'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            
            showNotification('Generating PDF...', 'info');
            
            html2pdf().set(opt).from(element).save().then(() => {
                showNotification('PDF downloaded successfully!', 'success');
            }).catch(err => {
                showNotification('Error generating PDF', 'error');
                console.error('PDF generation error:', err);
            });
        }

        // Save data to localStorage
        function saveData(auto = false) {
            const data = {
                template: currentTemplate,
                personalInfo: getPersonalInfo(),
                summary: getSummary(),
                experience: getExperience(),
                education: getEducation(),
                skills: getSkills(),
                projects: getProjects(),
                certifications: getCertifications(),
                counts: {
                    experience: experienceCount,
                    education: educationCount,
                    skills: skillsCount,
                    projects: projectsCount,
                    certifications: certificationsCount
                }
            };
            
            try {
                // Use a simple object to store data instead of localStorage
                window.cvData = data;
                if (!auto) {
                    showNotification('Data saved successfully!', 'success');
                }
            } catch (error) {
                showNotification('Error saving data', 'error');
                console.error('Save error:', error);
            }
        }

        // Load data from storage
        function loadData() {
            try {
                const data = window.cvData;
                if (!data) {
                    showNotification('No saved data found', 'info');
                    return;
                }
                
                // Load template
                currentTemplate = data.template || 'modern';
                document.querySelectorAll('.template-option').forEach(opt => {
                    opt.classList.toggle('active', opt.dataset.template === currentTemplate);
                });
                
                // Load personal info
                if (data.personalInfo) {
                    Object.keys(data.personalInfo).forEach(key => {
                        const element = document.getElementById(key);
                        if (element) {
                            element.value = data.personalInfo[key] || '';
                        }
                    });
                }
                
                // Load summary
                if (data.summary) {
                    document.getElementById('summary').value = data.summary;
                }
                
                // Clear existing sections
                document.getElementById('experienceContainer').innerHTML = '';
                document.getElementById('educationContainer').innerHTML = '';
                document.getElementById('skillsContainer').innerHTML = '';
                document.getElementById('projectsContainer').innerHTML = '';
                document.getElementById('certificationsContainer').innerHTML = '';
                
                // Reset counters
                experienceCount = 0;
                educationCount = 0;
                skillsCount = 0;
                projectsCount = 0;
                certificationsCount = 0;
                
                // Load experience
                if (data.experience) {
                    data.experience.forEach(exp => {
                        addExperience();
                        const section = document.querySelector('#experienceContainer .dynamic-section:last-child');
                        section.querySelector('.experience-title').value = exp.title || '';
                        section.querySelector('.experience-company').value = exp.company || '';
                        section.querySelector('.experience-start').value = exp.startDate || '';
                        section.querySelector('.experience-end').value = exp.endDate === 'Present' ? '' : exp.endDate || '';
                        section.querySelector('.experience-current').checked = exp.endDate === 'Present';
                        section.querySelector('.experience-description').value = exp.description || '';
                    });
                }
                
                // Load education
                if (data.education) {
                    data.education.forEach(edu => {
                        addEducation();
                        const section = document.querySelector('#educationContainer .dynamic-section:last-child');
                        section.querySelector('.education-degree').value = edu.degree || '';
                        section.querySelector('.education-institution').value = edu.institution || '';
                        section.querySelector('.education-year').value = edu.year || '';
                        section.querySelector('.education-gpa').value = edu.gpa || '';
                        section.querySelector('.education-description').value = edu.description || '';
                    });
                }
                
                // Load skills
                if (data.skills) {
                    data.skills.forEach(skill => {
                        addSkill();
                        const section = document.querySelector('#skillsContainer .dynamic-section:last-child');
                        section.querySelector('.skill-category').value = skill.category || '';
                        section.querySelector('.skill-items').value = skill.items ? skill.items.join(', ') : '';
                    });
                }
                
                // Load projects
                if (data.projects) {
                    data.projects.forEach(project => {
                        addProject();
                        const section = document.querySelector('#projectsContainer .dynamic-section:last-child');
                        section.querySelector('.project-name').value = project.name || '';
                        section.querySelector('.project-tech').value = project.tech || '';
                        section.querySelector('.project-url').value = project.url || '';
                        section.querySelector('.project-description').value = project.description || '';
                    });
                }
                
                // Load certifications
                if (data.certifications) {
                    data.certifications.forEach(cert => {
                        addCertification();
                        const section = document.querySelector('#certificationsContainer .dynamic-section:last-child');
                        section.querySelector('.cert-name').value = cert.name || '';
                        section.querySelector('.cert-org').value = cert.organization || '';
                        section.querySelector('.cert-date').value = cert.date || '';
                        section.querySelector('.cert-id').value = cert.id || '';
                    });
                }
                
                updatePreview();
                updateProgress();
                showNotification('Data loaded successfully!', 'success');
                
            } catch (error) {
                showNotification('Error loading data', 'error');
                console.error('Load error:', error);
            }
        }

        // Load saved data on page load
        function loadSavedData() {
            // Initialize with empty data if none exists
            if (!window.cvData) {
                // Add default sections
                setTimeout(() => {
                    addExperience();
                    addEducation();
                    addSkill();
                }, 100);
            } else {
                loadData();
            }
        }

        // Preview fullscreen
        function previewFullscreen() {
            const preview = document.getElementById('cvPreview');
            const newWindow = window.open('', '_blank', 'width=800,height=1000');
            
            newWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>CV Preview</title>
                    <style>
                        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; }
                        ${document.querySelector('style').innerHTML}
                    </style>
                </head>
                <body>
                    ${preview.outerHTML}
                </body>
                </html>
            `);
            
            newWindow.document.close();
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Initialize sample data for demonstration
        function initializeSampleData() {
            document.getElementById('fullName').value = 'John Doe';
            document.getElementById('title').value = 'Senior Software Engineer';
            document.getElementById('email').value = 'john.doe@email.com';
            document.getElementById('phone').value = '+1 (555) 123-4567';
            document.getElementById('location').value = 'Seattle, WA';
            document.getElementById('linkedin').value = 'https://linkedin.com/in/johndoe';
            document.getElementById('github').value = 'https://github.com/johndoe';
            document.getElementById('summary').value = 'Experienced software engineer with 5+ years of expertise in full-stack development, cloud technologies, and team leadership. Proven track record of delivering scalable solutions and mentoring junior developers.';
            
            updatePreview();
            updateProgress();
        }

        // Add keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key) {
                    case 's':
                        e.preventDefault();
                        saveData();
                        break;
                    case 'p':
                        e.preventDefault();
                        downloadPDF();
                        break;
                    case 'l':
                        e.preventDefault();
                        loadData();
                        break;
                }
            }
        });
    </script>
</body>
</html>
